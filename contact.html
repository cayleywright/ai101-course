<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-nav">
    <a href="index.html" aria-label="WrightOps home"><span class="wordmark"><span class="wm-light">Wright</span><span class="wm-bold">Ops</span></span></a>
    <details class="nav-disclosure">
      <summary aria-label="Toggle menu">Menu</summary>
      <nav class="nav-links" aria-label="Primary">
        <a href="courses.html">Courses</a>
        <a href="about.html">About</a>
        <a href="contact.html" aria-current="page">Contact</a>
      </nav>
    </details>
  </header>

  <main id="main">
    <section class="section wrap">
      <span class="eyebrow">Contact</span>
      <h2>Let's <strong>talk</strong></h2>
      <p class="lead">Tell us a bit about what you're working on. We'll get back to you.</p>

      <form class="form" action="mailto:hello@wrightops.com.au" method="post" enctype="text/plain">
        <label class="field">
          <span>Name</span>
          <input type="text" name="name" autocomplete="name" required>
        </label>
        <label class="field">
          <span>Email</span>
          <input type="email" name="email" autocomplete="email" required>
        </label>
        <label class="field">
          <span>What can we help with?</span>
          <textarea name="message" rows="5" required></textarea>
        </label>
        <button type="submit" class="btn">Send</button>
        <p class="form-note">This opens your email app. You can also email us directly at
          <a href="mailto:hello@wrightops.com.au">hello@wrightops.com.au</a>.</p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
